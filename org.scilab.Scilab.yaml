app-id: org.scilab.Scilab
runtime: org.freedesktop.Sdk
sdk: org.freedesktop.Sdk
runtime-version: '24.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17
command: scilab
build-options:
  no-debuginfo: true
  env:
    JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
    PATH: /usr/lib/sdk/openjdk17/bin:/app/share/ant/bin:/usr/bin:/bin
finish-args:
  - --env=MESA_GL_VERSION_OVERRIDE=2.1
  - --env=JAVA_HOME=/app/lib/jvm
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --share=network
  - --filesystem=home
rename-appdata-file: scilab.appdata.xml
cleanup:
  - /share/man
  - /share/gtk-doc
  - /share/aclocal
  - /lib/pkgconfig
  - '*.la'
  - '*.a'

modules:
  - name: ncurses
    config-opts:
      - --with-shared
      - --with-normal
      - --without-debug
      - --without-ada
      - --enable-widec
      - --disable-pc-files
      - --with-cxx-binding
      - --with-cxx-shared
      - --with-versioned-syms
      - --with-abi-version=5
      - --with-termlib=tinfo
    post-install:
      - for lib in ncurses ncurses++ form panel menu; do ln -s lib${lib}w.so.5 /app/lib/lib${lib}.so.5;
        done
      - ln -s libncurses.so.5 /app/lib/libtic.so.5
      - for lib in ncurses ncurses++ form panel menu; do ln -sf lib${lib}w.so.5 /app/lib/lib${lib}.so;
        done
      - ln -sf libncurses.so.5 /app/lib/libcurses.so.5
      - ln -sf libncurses.so /app/lib/libcurses.so
    sources:
      - type: archive
        url: https://invisible-island.net/archives/ncurses/ncurses-6.5.tar.gz
        sha256: 136d91bc269a9a5785e5f9e980bc76ab57428f604ce3e5a5a90cebc767971cc6
        x-checker-data:
          type: anitya
          project-id: 2057
          stable-only: true
          url-template: https://invisible-island.net/archives/ncurses/ncurses-$version.tar.gz

  - name: openblas
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_WITHOUT_CBLAS=OFF
      - -DBUILD_WITHOUT_LAPACK=OFF
      - -DDYNAMIC_ARCH=ON
      - -DUSE_OPENMP=ON
    sources:
      - type: archive
        url: https://github.com/OpenMathLib/OpenBLAS/releases/download/v0.3.28/OpenBLAS-0.3.28.tar.gz
        sha256: f1003466ad074e9b0c8d421a204121100b0751c96fc6fcf3d1456bd12f8a00a1

  - name: arpack-ng
    buildsystem: cmake-ninja
    config-opts:
      - -DBLA_VENDOR=OpenBLAS
      - -DBUILD_SHARED_LIBS=ON
      - -DEXAMPLES=OFF
    sources:
      - type: archive
        url: https://github.com/opencollab/arpack-ng/archive/refs/tags/3.9.1.tar.gz
        sha256: f6641deb07fa69165b7815de9008af3ea47eb39b2bb97521fbf74c97aba6e844

  - name: pcre2
    config-opts:
      - --enable-shared
      - --enable-pcre2-32
      - --enable-pcre2-16
      - --enable-jit
    sources:
      - type: archive
        url: https://github.com/PCRE2Project/pcre2/releases/download/pcre2-10.43/pcre2-10.43.tar.bz2
        sha256: e2a53984ff0b07dfdb5ae4486bbb9b21cca8e7df2434096cc9bf1b728c350bcb

  - name: hdf5
    config-opts:
      - --enable-shared
      - --disable-static
      - --enable-hl
      - --disable-fortran
      - --disable-cxx
      - --disable-tools
      - --with-zlib
    post-install:
      # HDF5 autotools build doesn't install hdf5.pc; create one so matio.pc resolves
      - |
        mkdir -p /app/lib/pkgconfig
        { echo 'prefix=/app'
          echo 'exec_prefix=${prefix}'
          echo 'libdir=${exec_prefix}/lib'
          echo 'includedir=${prefix}/include'
          echo ''
          echo 'Name: HDF5'
          echo 'Description: HDF5 library'
          echo 'Version: 1.14.4'
          echo 'Libs: -L${libdir} -lhdf5'
          echo 'Cflags: -I${includedir}'
        } > /app/lib/pkgconfig/hdf5.pc
    sources:
      - type: archive
        url: https://github.com/HDFGroup/hdf5/releases/download/hdf5_1.14.4.3/hdf5-1.14.4-3.tar.gz
        sha256: 019ac451d9e1cf89c0482ba2a06f07a46166caf23f60fea5ef3c37724a318e03
        strip-components: 2

  - name: matio
    config-opts:
      - --enable-shared
      - --with-hdf5=/app
    sources:
      - type: archive
        url: https://github.com/tbeu/matio/releases/download/v1.5.28/matio-1.5.28.tar.gz
        sha256: 9da698934a21569af058e6348564666f45029e6c2b0878ca0d8f9609bf77b8d8

  - name: fftw
    config-opts:
      - --enable-shared
      - --enable-threads
      - --disable-fortran
    sources:
      - type: archive
        url: https://www.fftw.org/fftw-3.3.10.tar.gz
        sha256: 56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467

  - name: libarchive
    config-opts:
      - --disable-bsdtar
      - --disable-bsdcpio
      - --disable-bsdcat
    sources:
      - type: archive
        url: https://github.com/libarchive/libarchive/releases/download/v3.7.1/libarchive-3.7.1.tar.xz
        sha256: b17403ce670ff18d8e06fea05a9ea9accf70678c88f1b9392a2e29b51127895f

  - name: eigen
    buildsystem: simple
    build-commands:
      - cp -r Eigen /app/include/
      - cp -r unsupported /app/include/
    sources:
      - type: archive
        url: https://gitlab.com/libeigen/eigen/-/archive/3.3.2/eigen-3.3.2.tar.bz2
        sha256: a530aa818520bb4e9f36e099696ca1a087e6d8e564f7e50abb544f5ac91d519f
        strip-components: 1

  - name: rapidjson
    buildsystem: simple
    build-commands:
      - cp -r include/rapidjson /app/include/
    sources:
      - type: archive
        url: https://github.com/Tencent/rapidjson/archive/24b5e7a.tar.gz
        sha256: 2d2601a82d2d3b7e143a3c8d43ef616671391034bc46891a9816b79cf2d3e7a8
        strip-components: 1

  # Scilab links against libOpenXLSX.so; cmake shared-lib build not supported
  # upstream, so we manually link the static archive into a shared library.
  - name: openxlsx
    buildsystem: simple
    build-commands:
      - cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_CXX_FLAGS="-include cstdint" -G Ninja
      - cmake --build build --target OpenXLSX
      - mkdir -p /app/include/OpenXLSX
      - cp -r OpenXLSX/headers/. /app/include/OpenXLSX/
      - g++ -shared -o /app/lib/libOpenXLSX.so
          -Wl,--whole-archive build/output/libOpenXLSX.a
          -Wl,--no-whole-archive
    sources:
      - type: archive
        url: https://github.com/troldal/OpenXLSX/archive/refs/tags/v0.3.2.tar.gz
        sha256: e379f29a8ba4c4c33a2ef0589cf2fbc956411514748b2b7b45aaeff393e52cb3

  - name: suitesparse
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSUITESPARSE_ENABLE_PROJECTS=suitesparse_config;amd;btf;colamd;klu
      - -DBUILD_SHARED_LIBS=ON
      - -DBUILD_TESTING=OFF
      - -DSUITESPARSE_USE_OPENMP=OFF
    sources:
      - type: archive
        url: https://github.com/DrTimothyAldenDavis/SuiteSparse/archive/refs/tags/v7.8.3.tar.gz
        sha256: ce39b28d4038a09c14f21e02c664401be73c0cb96a9198418d6a98a7db73a259

  - name: tcl
    subdir: unix
    post-install:
      - ln -sf tclsh8.6 /app/bin/tclsh
    sources:
      - type: archive
        url: https://prdownloads.sourceforge.net/tcl/tcl8.6.15-src.tar.gz
        sha256: 861e159753f2e2fbd6ec1484103715b0be56be3357522b858d3cbb5f893ffef1

  - name: tk
    subdir: unix
    config-opts:
      - --with-tcl=/app/lib
      - --enable-shared
    sources:
      - type: archive
        url: https://prdownloads.sourceforge.net/tcl/tk8.6.15-src.tar.gz
        sha256: 550969f35379f952b3020f3ab7b9dd5bfd11c1ef7c9b7c6a75f5c49aca793fec

  - name: ant
    buildsystem: simple
    build-commands:
      - mkdir -p /app/share/ant
      - cp -r . /app/share/ant/
      - ln -s /app/share/ant/bin/ant /app/bin/ant
    sources:
      - type: archive
        url: https://archive.apache.org/dist/ant/binaries/apache-ant-1.10.5-bin.tar.gz
        sha256: cd52c6f77a0b1de7174addc94e5a512d86978ac9173a30cd11f4ab26f6d8deba
        strip-components: 1

  - name: flexdock
    buildsystem: simple
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        ANT_HOME: /app/share/ant
        PATH: /usr/lib/sdk/openjdk17/bin:/app/share/ant/bin:/usr/bin:/bin
    build-commands:
      # Java 17 dropped support for source/target <7; patch 1.5 → 8
      - sed -i 's/source="1\.5" target="1\.5"/source="8" target="8"/g' build.xml
      - ant jar
      - install -Dm644 build/flexdock-1.2.5.jar /app/share/java/flexdock-1.2.5.jar
    sources:
      - type: archive
        url: https://gitlab.com/scilab/forge/flexdock/-/archive/1.2.5/flexdock-1.2.5.tar.gz
        sha256: eb26c65b6ce347b52c02cb2bbce1ec595392baa64347ef9df8fde5acff5d8aaa
        strip-components: 1

  - name: jrosetta
    buildsystem: simple
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        PATH: /usr/lib/sdk/openjdk17/bin:/usr/bin:/bin
    build-commands:
      - mkdir -p build/api
      - javac -source 8 -target 8 -d build/api
          $(find modules/jrosetta-api/src/main/java -name "*.java")
      - jar cf jrosetta-api-1.0.4.jar -C build/api .
      - mkdir -p build/engine
      - javac -source 8 -target 8 -cp build/api -d build/engine
          $(find modules/jrosetta-engine/src/main/java -name "*.java")
      - jar cf jrosetta-engine-1.0.4.jar -C build/engine .
      - install -Dm644 jrosetta-api-1.0.4.jar /app/share/java/jrosetta-api-1.0.4.jar
      - install -Dm644 jrosetta-engine-1.0.4.jar /app/share/java/jrosetta-engine-1.0.4.jar
    sources:
      - type: archive
        url: http://deb.debian.org/debian/pool/main/libj/libjrosetta-java/libjrosetta-java_1.0.4.orig.tar.bz2
        sha256: 57e214b3788520b0c9718e817a7277e732a90de25f78a7eb044595bb6b4b4fce
        strip-components: 1

  - name: Scilab
    buildsystem: simple
    build-options:
      env:
        JAVA_HOME: /usr/lib/sdk/openjdk17/jvm/openjdk-17
        ANT_HOME: /app/share/ant
        PATH: /usr/lib/sdk/openjdk17/bin:/app/share/ant/bin:/usr/bin:/bin
        LD_LIBRARY_PATH: /app/lib
    build-commands:
      - mkdir -p scilab/lib/thirdparty
      - cp /app/share/java/flexdock-1.2.5.jar scilab/thirdparty/
      - cp /app/share/java/jrosetta-api-1.0.4.jar scilab/thirdparty/
      - cp /app/share/java/jrosetta-engine-1.0.4.jar scilab/thirdparty/
      - unzip -j jogl-natives.jar 'natives/linux-amd64/*.so' -d scilab/lib/thirdparty/
      - unzip -j gluegen-rt-natives.jar 'natives/linux-amd64/*.so' -d scilab/lib/thirdparty/
      - mkdir -p jcef-native-extract
      - unzip -j jcef-natives-linux-amd64.jar '*.tar.gz' -d jcef-native-extract/
      - mkdir -p scilab/lib/thirdparty/jcef
      - tar -xzf jcef-native-extract/*.tar.gz -C scilab/lib/thirdparty/jcef/
      - mkdir -p /app/lib/jvm
      - cp -a /usr/lib/sdk/openjdk17/jvm/openjdk-17/. /app/lib/jvm/
      - |
        cd scilab
        LIBS="-ltinfo" ./configure \
          --prefix=/app \
          --disable-build-help \
          --disable-build-localization \
          --without-modelica \
          --without-umfpack \
          --with-eigen-include=/app/include \
          --with-tcl-include=/app/include \
          --with-tcl-library=/app/lib \
          --with-tk-include=/app/include \
          --with-tk-library=/app/lib
      - make -C scilab -j$(nproc)
      - make -C scilab install
      - mkdir -p /app/share/scilab/thirdparty
      - cp -r scilab/thirdparty/. /app/share/scilab/thirdparty/
      - mkdir -p /app/lib/thirdparty
      - cp -r scilab/lib/thirdparty/. /app/lib/thirdparty/
      - mkdir -p /app/share/scilab/modules/tclsci
      - cp -r scilab/modules/tclsci/tcl /app/share/scilab/modules/tclsci/
      - cp -r bwidget-src /app/share/scilab/modules/tclsci/tcl/BWidget
      # Fix classpath.xml so JARs are found at runtime
      - |
        BUILD_TP=$(realpath scilab/thirdparty)
        sed -i "s|${BUILD_TP}/|\$SCILAB/thirdparty/|g" \
          /app/share/scilab/etc/classpath.xml
      - rm -rf /app/share/icons/hicolor/{16x16,24x24,32x32,48x48}/
      - mv /app/share/icons/hicolor/256x256/apps/scinotes.png
          /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.scinotes.png
      - mv /app/share/icons/hicolor/256x256/apps/xcos.png
          /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.xcos.png
      - mv /app/share/icons/hicolor/256x256/apps/scilab.png
          /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
      - mv /app/share/applications/scilab-adv-cli.desktop
          /app/share/applications/${FLATPAK_ID}.scilab-adv-cli.desktop
      - mv /app/share/applications/scilab-cli.desktop
          /app/share/applications/${FLATPAK_ID}.scilab-cli.desktop
      - mv /app/share/applications/scinotes.desktop
          /app/share/applications/${FLATPAK_ID}.scinotes.desktop
      - mv /app/share/applications/xcos.desktop
          /app/share/applications/${FLATPAK_ID}.xcos.desktop
      - mv /app/share/applications/scilab.desktop
          /app/share/applications/${FLATPAK_ID}.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID}
          /app/share/applications/${FLATPAK_ID}.scilab-adv-cli.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID}
          /app/share/applications/${FLATPAK_ID}.scilab-cli.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID}.scinotes
          /app/share/applications/${FLATPAK_ID}.scinotes.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID}.xcos
          /app/share/applications/${FLATPAK_ID}.xcos.desktop
      - desktop-file-edit --set-icon=${FLATPAK_ID}
          /app/share/applications/${FLATPAK_ID}.desktop
    sources:
      - type: archive
        url: https://gitlab.com/scilab/scilab/-/archive/2026.0.1/scilab-2026.0.1.tar.bz2
        sha256: 0ad1c4120635a20b30ee28d350a5a20182741577f06ab36bb0cf8ed343047fe8
      - type: patch
        path: Improve-AppStream-metadata.patch
      - type: file
        url: https://repo1.maven.org/maven2/javax/activation/activation/1.1.1/activation-1.1.1.jar
        sha256: ae475120e9fcd99b4b00b38329bd61cdc5eb754eee03fe66c01f50e137724f99
